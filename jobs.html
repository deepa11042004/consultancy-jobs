<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Department Selection - Jobs</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <!-- Font Awesome for icons -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="min-h-screen bg-purple-100 flex items-center justify-center p-4">
    <main class="w-full max-w-3xl bg-white rounded-2xl shadow-xl p-8">
      <header class="mb-8 text-center">
        <h1 class="text-2xl md:text-3xl font-bold text-gray-900">
          Welcome, Abhishek Yadav!
        </h1>
        <p class="mt-2 text-gray-600">Select your preferred department</p>
      </header>

      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <button
          class="flex items-center gap-4 rounded-xl bg-white p-5 shadow-sm hover:shadow-md transition"
        >
          <span
            class="flex h-12 w-12 items-center justify-center rounded-lg bg-blue-500 text-white"
          >
            <i class="fas fa-clipboard-check"></i>
          </span>
          <span class="font-semibold text-gray-800">Quality</span>
        </button>

        <button
          class="flex items-center gap-4 rounded-xl bg-white p-5 shadow-sm hover:shadow-md transition"
        >
          <span
            class="flex h-12 w-12 items-center justify-center rounded-lg bg-emerald-500 text-white"
          >
            <i class="fas fa-store"></i>
          </span>
          <span class="font-semibold text-gray-800">Store</span>
        </button>

        <button
          class="flex items-center gap-4 rounded-xl bg-white p-5 shadow-sm hover:shadow-md transition"
        >
          <span
            class="flex h-12 w-12 items-center justify-center rounded-lg bg-purple-600 text-white"
          >
            <i class="fas fa-shopping-cart"></i>
          </span>
          <span class="font-semibold text-gray-800">Purchase</span>
        </button>

        <button
          class="flex items-center gap-4 rounded-xl bg-white p-5 shadow-sm hover:shadow-md transition"
        >
          <span
            class="flex h-12 w-12 items-center justify-center rounded-lg bg-orange-500 text-white"
          >
            <i class="fas fa-coins"></i>
          </span>
          <span class="font-semibold text-gray-800">Accounts</span>
        </button>

        <button
          class="flex items-center gap-4 rounded-xl bg-white p-5 shadow-sm hover:shadow-md transition"
        >
          <span
            class="flex h-12 w-12 items-center justify-center rounded-lg bg-red-500 text-white"
          >
            <i class="fas fa-industry"></i>
          </span>
          <span class="font-semibold text-gray-800">Manufacturing</span>
        </button>

        <button
          class="flex items-center gap-4 rounded-xl bg-white p-5 shadow-sm hover:shadow-md transition"
        >
          <span
            class="flex h-12 w-12 items-center justify-center rounded-lg bg-indigo-500 text-white"
          >
            <i class="fas fa-user-tie"></i>
          </span>
          <span class="font-semibold text-gray-800">Office Coordinator</span>
        </button>

        <button
          class="flex items-center gap-4 rounded-xl bg-white p-5 shadow-sm hover:shadow-md transition"
        >
          <span
            class="flex h-12 w-12 items-center justify-center rounded-lg bg-teal-500 text-white"
          >
            <i class="fas fa-cogs"></i>
          </span>
          <span class="font-semibold text-gray-800">Production</span>
        </button>

        <button
          class="flex items-center gap-4 rounded-xl bg-white p-5 shadow-sm hover:shadow-md transition"
        >
          <span
            class="flex h-12 w-12 items-center justify-center rounded-lg bg-sky-500 text-white"
          >
            <i class="fas fa-chart-line"></i>
          </span>
          <span class="font-semibold text-gray-800">Sales</span>
        </button>

        <button
          class="flex items-center gap-4 rounded-xl bg-white p-5 shadow-sm hover:shadow-md transition"
        >
          <span
            class="flex h-12 w-12 items-center justify-center rounded-lg bg-fuchsia-500 text-white"
          >
            <i class="fas fa-keyboard"></i>
          </span>
          <span class="font-semibold text-gray-800">Data Entry</span>
        </button>

        <button
          class="flex items-center gap-4 rounded-xl bg-white p-5 shadow-sm hover:shadow-md transition"
        >
          <span
            class="flex h-12 w-12 items-center justify-center rounded-lg bg-amber-500 text-white"
          >
            <i class="fas fa-users"></i>
          </span>
          <span class="font-semibold text-gray-800">CRM</span>
        </button>

        <button
          class="flex items-center gap-4 rounded-xl bg-white p-5 shadow-sm hover:shadow-md transition"
        >
          <span
            class="flex h-12 w-12 items-center justify-center rounded-lg bg-emerald-700 text-white"
          >
            <i class="fas fa-bolt"></i>
          </span>
          <span class="font-semibold text-gray-800">Electrical</span>
        </button>

        <button
          class="flex items-center gap-4 rounded-xl bg-white p-5 shadow-sm hover:shadow-md transition"
        >
          <span
            class="flex h-12 w-12 items-center justify-center rounded-lg bg-cyan-600 text-white"
          >
            <i class="fas fa-microchip"></i>
          </span>
          <span class="font-semibold text-gray-800">Electronics</span>
        </button>
      </div>
    </main>
  </body>
</html>
