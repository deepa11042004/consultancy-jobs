<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Stack Solutions</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <!-- Font Awesome (icons) -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>
  <body class="auth-page">
    <main class="auth-container">
      <div class="auth-card">
        <div class="auth-logo">
          <div class="auth-logo-inner">
            <i class="fas fa-layer-group"></i>
          </div>
        </div>

        <div class="auth-header">
          <h1>Welcome to Stack Solutions</h1>
          <p>Enter your details to get started</p>
        </div>

        <form id="loginForm" class="auth-form" novalidate>
          <div class="form-field">
            <label for="fullName">Full Name</label>
            <input
              id="fullName"
              name="fullName"
              type="text"
              placeholder="Enter your full name"
              required
            />
          </div>

          <div class="form-field">
            <label for="mobileNumber">Mobile Number</label>
            <input
              id="mobileNumber"
              name="mobileNumber"
              type="tel"
              placeholder="Enter 10-digit mobile number"
              pattern="\d{10}"
              required
            />
          </div>

          <button type="submit" class="btn btn-primary w-full">Continue</button>
        </form>

        <button id="adminBtn" class="btn btn-white btn-xs w-full mt-4">
          🔒 Admin Login
        </button>
      </div>
    </main>

    <!-- Admin Login Modal -->
    <div id="adminModal" class="modal" aria-hidden="true">
      <div class="modal-overlay" data-close="true"></div>
      <div
        class="modal-content"
        role="dialog"
        aria-modal="true"
        aria-labelledby="adminTitle"
      >
        <button class="modal-close" data-close="true" aria-label="Close">
          <i class="fas fa-times"></i>
        </button>
        <h2 id="adminTitle">Admin Login</h2>
        <p class="modal-subtitle">Enter your credentials to continue</p>

        <form id="adminForm" class="auth-form" novalidate>
          <div class="form-field">
            <label for="adminUser">Username</label>
            <input
              id="adminUser"
              name="adminUser"
              type="text"
              placeholder="Username"
              required
            />
          </div>

          <div class="form-field">
            <label for="adminPass">Password</label>
            <input
              id="adminPass"
              name="adminPass"
              type="password"
              placeholder="Password"
              required
            />
          </div>

          <button type="submit" class="btn btn-primary w-full">Sign In</button>
        </form>
      </div>
    </div>

    <script>
      const form = document.getElementById("loginForm");
      form.addEventListener("submit", (event) => {
        event.preventDefault();
        const fullName = document.getElementById("fullName").value.trim();
        const mobile = document.getElementById("mobileNumber").value.trim();

        if (!fullName || !/^\d{10}$/.test(mobile)) {
          alert("Please enter a valid name and a 10-digit mobile number.");
          return;
        }

        alert(
          `Welcome, ${fullName}!\nWe have sent a confirmation to ${mobile}.`,
        );
      });

      const adminBtn = document.getElementById("adminBtn");
      const adminModal = document.getElementById("adminModal");
      const adminForm = document.getElementById("adminForm");

      const openAdminModal = () => {
        adminModal.classList.add("modal-open");
        adminModal.setAttribute("aria-hidden", "false");
        document.body.style.overflow = "hidden";
      };

      const closeAdminModal = () => {
        adminModal.classList.remove("modal-open");
        adminModal.setAttribute("aria-hidden", "true");
        document.body.style.overflow = "";
      };

      adminBtn.addEventListener("click", openAdminModal);

      adminModal.addEventListener("click", (event) => {
        if (event.target.matches("[data-close]")) {
          closeAdminModal();
        }
      });

      adminForm.addEventListener("submit", (event) => {
        event.preventDefault();
        const username = document.getElementById("adminUser").value.trim();
        const password = document.getElementById("adminPass").value;

        // Simple demo credentials (replace with real auth logic)
        if (username === "admin" && password === "admin123") {
          alert("Admin login successful!");
          closeAdminModal();
          return;
        }

        alert("Invalid admin credentials.");
      });
    </script>
  </body>
</html>
